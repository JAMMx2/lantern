# Publishes Lantern Lite to GitHub Pages on every push to main.
# One-time setup in the repo: Settings → Pages → Source: "GitHub Actions".
name: Deploy Lantern Lite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (Lite is the homepage)
        run: |
          mkdir -p _site
          cp lantern-lite.html _site/index.html
          cp lantern-lite.html _site/lantern-lite.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
