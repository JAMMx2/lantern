<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200">
  <defs>
    <radialGradient id="flameGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb454" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffb454" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#123420" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a1f13" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="gGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ambient glow behind everything -->
  <circle cx="80" cy="118" r="52" fill="url(#flameGlow)">
    <animate attributeName="r" values="52;58;52;55;52" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.75;1;0.88;1" dur="3.6s" repeatCount="indefinite"/>
  </circle>

  <!-- light rays -->
  <g stroke="#ffb454" stroke-width="2.6" stroke-linecap="round" opacity="0.7">
    <line x1="20" y1="118" x2="36" y2="118">
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="124" y1="118" x2="140" y2="118">
      <animate attributeName="opacity" values="0.9;0.25;0.9" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="32" y1="86" x2="43" y2="94">
      <animate attributeName="opacity" values="0.3;0.75;0.3" dur="3.4s" repeatCount="indefinite"/>
    </line>
    <line x1="128" y1="86" x2="117" y2="94">
      <animate attributeName="opacity" values="0.75;0.3;0.75" dur="3.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- hanging ring + hook -->
  <g stroke="#3bf07e" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#gGlow)">
    <circle cx="80" cy="14" r="8"/>
    <line x1="80" y1="22" x2="80" y2="32"/>
  </g>

  <!-- cap -->
  <g stroke="#3bf07e" stroke-width="4" fill="#071409" stroke-linejoin="round" filter="url(#gGlow)">
    <path d="M46 56 Q80 26 114 56 Z"/>
    <line x1="40" y1="56" x2="120" y2="56"/>
  </g>

  <!-- glass chamber -->
  <rect x="52" y="62" width="56" height="88" rx="10" fill="url(#glass)" stroke="#2a4a33" stroke-width="2.5"/>

  <!-- flame -->
  <g filter="url(#aGlow)">
    <path fill="#ffb454" d="M80 132 C67 118 71 106 80 88 C89 106 93 118 80 132 Z">
      <animateTransform attributeName="transform" type="scale" additive="sum"
        values="1 1;1.04 0.97;0.98 1.03;1.03 0.99;1 1" dur="1.9s" repeatCount="indefinite"
        keyTimes="0;0.25;0.5;0.75;1"/>
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0 0;-3.2 3.9;1.6 -3.9;-2.4 1.3;0 0" dur="1.9s" repeatCount="indefinite"
        keyTimes="0;0.25;0.5;0.75;1"/>
    </path>
    <path fill="#ffe9c4" d="M80 124 C74 116 76 108 80 100 C84 108 86 116 80 124 Z">
      <animate attributeName="opacity" values="1;0.8;1;0.9;1" dur="1.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- cage bars over glass -->
  <g stroke="#3bf07e" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#gGlow)">
    <path d="M50 62 L46 150"/>
    <path d="M110 62 L114 150"/>
    <line x1="80" y1="62" x2="80" y2="70"/>
    <line x1="80" y1="142" x2="80" y2="150"/>
  </g>

  <!-- base -->
  <g stroke="#3bf07e" stroke-width="4" fill="#071409" stroke-linejoin="round" filter="url(#gGlow)">
    <path d="M42 150 L118 150 L112 172 L48 172 Z"/>
    <line x1="56" y1="160" x2="104" y2="160" stroke-width="2.5" opacity="0.7"/>
  </g>
</svg>
